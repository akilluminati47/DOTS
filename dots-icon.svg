<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="108" height="108" fill="#080d08"/>

  <!-- Outer glow halo -->
  <circle cx="54" cy="54" r="36" fill="#00FF9A" fill-opacity="0.07"/>

  <!-- Main dot with glow filter -->
  <circle cx="54" cy="54" r="18" fill="#00FF9A" filter="url(#glow)"/>

  <!-- Inner specular highlight -->
  <circle cx="48" cy="48" r="6" fill="white" fill-opacity="0.45"/>

  <!-- Crosshair arms -->
  <line x1="54" y1="22" x2="54" y2="30" stroke="#00FF9A" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="54" y1="78" x2="54" y2="86" stroke="#00FF9A" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="22" y1="54" x2="30"  y2="54" stroke="#00FF9A" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="78" y1="54" x2="86"  y2="54" stroke="#00FF9A" stroke-width="1.2" stroke-opacity="0.35"/>
</svg>
